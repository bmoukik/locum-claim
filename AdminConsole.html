<!-- Crest Pharmacies — Admin console (Apps Script HtmlService file).
     Paste this into the Apps Script editor as an HTML file named "Admin"
     (Code.gs serves it via createTemplateFromFile('Admin')). Served ONLY by
     the admin deployment: Google sign-in + email allowlist + PIN — see
     adminPage_ in Code.gs. The repo's admin.html is the demo-mode design
     preview of this same UI; keep the two in step. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D47A1; --navy-deep:#0A3A85; --navy-ink:#082E68; --rail:#081F49; --rail-ink:#0A2757;
  --accent:#4F88E4; --accent-soft:#EAF1FC;
  --bg:#F2F5FA; --card:#FFFFFF; --border:#DCE3EF; --border-light:#E9EEF6;
  --green:#1E9E5A; --red:#D7382B; --amber:#B45309;
  --txt:#1b2537; --mut:#59647d;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  --shadow:0 1px 2px rgba(13,47,104,.05),0 2px 10px rgba(13,47,104,.05);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}

.lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,var(--rail) 0%,var(--navy-ink) 55%,var(--navy-deep) 100%)}
.lockcard{background:var(--card);border-radius:16px;box-shadow:0 20px 60px rgba(4,16,40,.45);padding:34px 32px;width:100%;max-width:420px}
.lockcard .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.lockcard .brand .t1{font-weight:800;font-size:17px;color:var(--navy-ink)}
.lockcard .brand .t2{font-size:12.5px;color:var(--mut);letter-spacing:.6px;text-transform:uppercase;font-weight:700}
.lockcard h2{margin:0 0 6px;font-size:21px;color:var(--navy-ink)}
.lockcard p.sub{color:var(--mut);margin:0 0 8px;font-size:14px;line-height:1.5}
.idchip{display:inline-block;background:var(--accent-soft);color:var(--navy-ink);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:700;font-family:var(--mono);margin:4px 0 6px}

.shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.rail{background:var(--rail);color:#B9CBEA;padding:18px 0 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.rail .brand{display:flex;align-items:center;gap:10px;padding:0 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.rail .brand .t1{font-weight:800;font-size:14.5px;color:#fff;line-height:1.2}
.rail .brand .t2{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;color:#7E9CD1}
.rail nav{padding:12px 10px;flex:1}
.rail a{display:block;color:#B9CBEA;text-decoration:none;font-size:13.5px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:2px}
.rail a:hover{background:var(--rail-ink);color:#fff}
.rail .who{padding:12px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:12.5px;color:#7E9CD1;line-height:1.5;word-break:break-all}
.rail .who b{color:#fff}

.main{padding:0 32px 80px;max-width:1120px;width:100%}
.topbar{position:sticky;top:0;z-index:5;background:linear-gradient(to bottom,var(--bg) 82%,rgba(242,245,250,0));
  display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 0 12px}
.topbar h1{margin:0;font-size:20px;color:var(--navy-ink)}
.btn{background:var(--navy);color:#fff;border:0;padding:12px 22px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn:active{background:var(--navy-deep)}
.btn[disabled]{opacity:.55}
.btn.green{background:var(--green)}
.btn.wide{width:100%;padding:15px;margin-top:20px;font-size:16px}
.btn .cnt{display:inline-block;min-width:21px;padding:1px 6px;margin-left:8px;border-radius:999px;background:#fff;color:var(--navy);font-size:12.5px;vertical-align:1px}
.btn .cnt.zero{background:rgba(255,255,255,.25);color:#fff}
.btn2{background:#fff;color:var(--navy);border:1.5px dashed var(--accent);padding:10px 16px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;font-family:inherit}

.sec{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:22px 24px;margin-top:18px;scroll-margin-top:76px}
.sec h2{margin:0 0 2px;font-size:16.5px;color:var(--navy-ink)}
.sec p.sub{color:var(--mut);margin:0 0 14px;font-size:13.5px;line-height:1.5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}

.tblwrap{overflow-x:auto}
table.t{border-collapse:collapse;width:100%;font-size:14px}
table.t th{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);text-align:left;font-weight:700;
  padding:8px 10px;border-bottom:2px solid var(--border-light)}
table.t td{padding:6px 10px;border-bottom:1px solid var(--border-light);vertical-align:middle}
table.t tr:hover td{background:#FAFCFF}
table.t input[type=text],table.t input[type=email],table.t select{
  width:100%;min-width:120px;border:1.5px solid transparent;background:transparent;border-radius:8px;padding:8px 8px;font-size:14px;font-family:inherit;color:var(--txt)}
table.t input[type=email]{font-family:var(--mono);font-size:13px;min-width:230px}
table.t input:hover,table.t select:hover{border-color:var(--border)}
table.t input:focus,table.t select:focus{outline:none;border-color:var(--accent);background:#fff}
table.t .nm{font-weight:700;color:var(--navy-ink)}
.mini{background:#fff;color:var(--red);border:1.5px solid #FCA5A5;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.mini:hover{background:#FEF2F2}
.addrow{display:flex;gap:10px;margin-top:14px;align-items:center}
.addrow input{flex:1;max-width:340px;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit}
.addrow input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
.cov{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;background:var(--accent-soft);color:var(--navy-ink)}
.cov.none{background:#FEF3C7;color:#92400E}
.tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:700;background:#FEF3C7;color:#92400E;margin-left:8px}
input[type=checkbox]{width:19px;height:19px;accent-color:var(--navy);cursor:pointer}

label{display:block;font-weight:700;margin:0 0 6px;font-size:13px;color:var(--navy-ink)}
.field input[type=email],.field input[type=number],.field input[type=text],.field input[type=password]{
  width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14.5px;background:#fff;font-family:inherit}
.field input[type=email]{font-family:var(--mono);font-size:13.5px}
.field input[type=number],.field input[type=password]{font-family:var(--mono)}
.field input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
.field .hint{color:var(--mut);font-size:12.5px;margin:5px 0 0;line-height:1.45}
.lockcard label{margin-top:16px;font-size:14px}
.lockcard input{width:100%;padding:13px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit}
.lockcard input#p_pin{font-family:var(--mono);letter-spacing:4px}
.lockcard input:focus{outline:2px solid var(--accent);border-color:var(--accent)}

.warn{background:#FFF7ED;border:1px solid #FDBA74;color:var(--amber);border-radius:10px;padding:11px 14px;font-size:13.5px;margin-top:12px;line-height:1.5}
.err{background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B;border-radius:10px;padding:12px 14px;margin-top:12px;display:none;font-size:14px;line-height:1.65}
.banner{border-radius:10px;padding:13px 15px;font-size:14.5px;margin-top:12px;line-height:1.5}
.banner.info{background:var(--accent-soft);color:var(--navy-ink)}
.banner.good{background:#DCFCE7;color:#14532D}
.banner.bad{background:#FEE2E2;color:#991B1B}
.center{text-align:center}
.spin{display:inline-block;width:22px;height:22px;border:3px solid var(--accent-soft);border-top-color:var(--navy);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spin{animation:none}}

.chg{margin:14px 0 0;padding-left:20px;font-size:14.5px;line-height:2}
.chg li::marker{color:var(--accent)}
.confirmwrap{max-width:640px;margin:40px auto 0}

@media (max-width:900px){
  .shell{display:block}
  .rail{position:static;height:auto;flex-direction:row;align-items:center;padding:10px 12px;gap:6px;overflow-x:auto}
  .rail .brand{border:0;padding:0 10px 0 0;flex:none}
  .rail .brand .t2{display:none}
  .rail nav{display:flex;padding:0;gap:4px}
  .rail a{white-space:nowrap;padding:7px 10px}
  .rail .who{display:none}
  .main{padding:0 14px 70px}
  .grid2,.grid3{grid-template-columns:1fr}
  .topbar h1{font-size:17px}
}
</style>

<div id="app"><div class="lock"><div class="lockcard center"><p><span class="spin"></span></p><p class="sub">Loading…</p></div></div></div>

<script>
// Identity is Google-verified server-side; shown here for the UI only.
var WHO = '<?= adminEmail ?>';

var $app = document.getElementById('app');
function h(html){ $app.innerHTML = html; }
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

// The one transport: google.script.run -> adminApi (identity re-checked there)
function apiPost(body){
  return new Promise(function(resolve, reject){
    google.script.run
      .withSuccessHandler(function(s){ try{ resolve(JSON.parse(s)); }catch(e){ reject(e); } })
      .withFailureHandler(reject)
      .adminApi(JSON.stringify(body));
  });
}

var SESSION=null, CONFIG=null, ORIG=null, DEFAULT_PIN=false;

pinPage();

$app.addEventListener('input', updateCount);
$app.addEventListener('change', updateCount);
function updateCount(){
  var el=$('chgcount'); if(!el||!ORIG) return;
  try{ pull(); var n=diff().length; }catch(e){ return; }
  el.textContent=n;
  el.className='cnt'+(n?'':' zero');
}

// PIN gate — Google sign-in and the allowlist have already passed server-side;
// this is the third layer.
function pinPage(msg){
  h('<div class="lock"><div class="lockcard">'+
    '<div class="brand"><div><div class="t1">Crest Pharmacies</div><div class="t2">Admin console</div></div></div>'+
    '<h2>Enter the PIN</h2>'+
    '<p class="sub">Google-verified as</p><span class="idchip">'+esc(WHO)+'</span>'+
    '<p class="sub">This console sets the pharmacies, validators, emails and settings that every Crest tool reads.</p>'+
    (msg?'<div class="banner bad">'+esc(msg)+'</div>':'')+
    '<label>Admin PIN</label><input type="password" id="p_pin" inputmode="numeric" autocomplete="off">'+
    '<button type="button" class="btn wide" id="pinbtn">Open console</button>'+
    '</div></div>');
  $('pinbtn').onclick = doAuth;
  $('p_pin').onkeydown = function(e){ if(e.key==='Enter') doAuth(); };
  $('p_pin').focus();
}
function doAuth(){
  var pin=$('p_pin').value.trim();
  if(!pin) return pinPage('Enter the admin PIN.');
  var btn=$('pinbtn'); btn.disabled=true; btn.textContent='Checking…';
  apiPost({action:'adminAuth', pin:pin}).then(function(res){
    if(!res.ok){
      if(res.code==='locked') return pinPage(res.message||'Too many wrong PINs. Locked for a while — try later.');
      return pinPage('That PIN is not right.');
    }
    SESSION=res.session; DEFAULT_PIN=!!res.defaultPin;
    // if the session timed out mid-edit, keep the unsaved edits and just
    // re-baseline the diff against the fresh server state
    var hadEdits = false;
    try{ hadEdits = !!(CONFIG && ORIG && diff().length); }catch(e2){}
    ORIG = normalise(res.config);
    if(!hadEdits) CONFIG = clone(ORIG);
    renderMain();
  }).catch(function(e){ pinPage(String(e && e.message || e)); });
}

function normalise(c){
  c = c || {};
  c.pharmacies = c.pharmacies || [];
  c.validators = c.validators || [];
  c.emails = c.emails || {};
  c.emails.accounts = c.emails.accounts || '';
  c.emails.locumHandling = c.emails.locumHandling || '';
  c.emails.cashAck = c.emails.cashAck || '';
  c.locum = c.locum || {}; c.cash = c.cash || {};
  if(c.locum.reminderDays==null) c.locum.reminderDays = 2;
  if(c.locum.escalateDays==null) c.locum.escalateDays = 4;
  if(c.cash.threshold==null) c.cash.threshold = 20;
  return c;
}

function shell(content){
  return '<div class="shell">'+
    '<aside class="rail">'+
      '<div class="brand"><div><div class="t1">Crest Pharmacies</div><div class="t2">Admin console</div></div></div>'+
      '<nav>'+
        '<a href="#sec-pharm">Pharmacies</a>'+
        '<a href="#sec-val">Validators</a>'+
        '<a href="#sec-email">Emails</a>'+
        '<a href="#sec-locum">Locum claims</a>'+
        '<a href="#sec-cash">Cash log</a>'+
        '<a href="#sec-pin">Security</a>'+
      '</nav>'+
      '<div class="who">Signed in as <b>'+esc(WHO)+'</b><br>Every save is logged against this Google account.</div>'+
    '</aside>'+
    '<div class="main">'+content+'</div>'+
    '</div>';
}

function activeValCount(phName){
  return CONFIG.validators.filter(function(v){return v.pharmacy===phName && v.active;}).length;
}

function renderMain(errs){
  var pharmRows = CONFIG.pharmacies.map(function(p,i){
    var n=activeValCount(p.name);
    return '<tr>'+
      '<td class="nm">'+esc(p.name)+(p.active?'':'<span class="tag">Off</span>')+'</td>'+
      '<td><input type="checkbox" data-phact="'+i+'"'+(p.active?' checked':'')+'></td>'+
      '<td><span class="cov'+(n?'':' none')+'">'+n+' approver'+(n===1?'':'s')+'</span></td>'+
      '<td style="text-align:right"><button class="mini" data-rmph="'+i+'">Remove</button></td>'+
      '</tr>';
  }).join('');

  var valRows = CONFIG.validators.map(function(v,i){
    var phOpts = CONFIG.pharmacies.map(function(p){
      return '<option'+(p.name===v.pharmacy?' selected':'')+'>'+esc(p.name)+'</option>';
    }).join('');
    return '<tr>'+
      '<td><input type="text" data-vname="'+i+'" value="'+esc(v.name)+'" placeholder="Name"></td>'+
      '<td><input type="email" data-vemail="'+i+'" value="'+esc(v.email)+'" placeholder="email@example.com"></td>'+
      '<td><select data-vph="'+i+'"><option value="">— select —</option>'+phOpts+'</select></td>'+
      '<td style="text-align:center"><input type="checkbox" data-vact="'+i+'"'+(v.active?' checked':'')+'></td>'+
      '<td style="text-align:right"><button class="mini" data-rmval="'+i+'">Remove</button></td>'+
      '</tr>';
  }).join('');

  h(shell(
    '<div class="topbar"><h1>Settings</h1>'+
    '<button type="button" class="btn" id="reviewbtn">Review changes<span class="cnt zero" id="chgcount">0</span></button></div>'+

    (DEFAULT_PIN?'<div class="warn"><b>The PIN is still the placeholder.</b> Change it in Security before anyone else uses this console.</div>':'')+
    '<div class="warn">Testing period: every address here is a <b>moukik.cyber+…@gmail.com</b> alias, so all app mail lands in one inbox, pre-labelled. Do not put real company addresses in until go-live.</div>'+
    (errs&&errs.length?'<div class="err" style="display:block"><b>Cannot save:</b><br>'+errs.map(function(m){return '• '+esc(m)}).join('<br>')+'</div>':'')+

    '<div class="sec" id="sec-pharm">'+
    '<h2>Pharmacies</h2>'+
    '<p class="sub">The list staff pick from. Turn one off to hide it from new claims without touching past ones. No renaming — past records point at the name; add a new one and switch the old off.</p>'+
    '<div class="tblwrap"><table class="t">'+
    '<tr><th>Pharmacy</th><th>In use</th><th>Approvers</th><th></th></tr>'+pharmRows+
    '</table></div>'+
    '<div class="addrow"><input type="text" id="newph" placeholder="New pharmacy name, exactly as staff should see it">'+
    '<button type="button" class="btn2" id="addph">+ Add pharmacy</button></div>'+
    '</div>'+

    '<div class="sec" id="sec-val">'+
    '<h2>Validators</h2>'+
    '<p class="sub">Who can approve a locum claim, per pharmacy. A pharmacy in use must keep at least one validator switched on.</p>'+
    '<div class="tblwrap"><table class="t">'+
    '<tr><th>Name</th><th>Email</th><th>Pharmacy</th><th style="text-align:center">Can approve</th><th></th></tr>'+valRows+
    '</table></div>'+
    '<div class="addrow"><button type="button" class="btn2" id="addval">+ Add validator</button></div>'+
    '</div>'+

    '<div class="sec" id="sec-email">'+
    '<h2>Emails</h2>'+
    '<p class="sub">Where each stream of app mail goes.</p>'+
    '<div class="grid3">'+
    '<div class="field"><label>Accounts (pays approved claims)</label><input type="email" id="e_acc" value="'+esc(CONFIG.emails.accounts)+'">'+
    '<p class="hint">Approved claims land here with the bank details. Whoever pays taps Paid.</p></div>'+
    '<div class="field"><label>Locum queries</label><input type="email" id="e_loc" value="'+esc(CONFIG.emails.locumHandling)+'">'+
    '<p class="hint">Where a stuck claim escalates to; reply-to on locum emails.</p></div>'+
    '<div class="field"><label>Cash log acknowledgements</label><input type="email" id="e_cash" value="'+esc(CONFIG.emails.cashAck)+'">'+
    '<p class="hint">Cash entries at or over the threshold go here.</p></div>'+
    '</div></div>'+

    '<div class="grid2">'+
    '<div class="sec" id="sec-locum" style="margin-top:18px">'+
    '<h2>Locum claims</h2>'+
    '<p class="sub">Nobody is ever approved automatically. A slow validator gets chased, then escalated.</p>'+
    '<div class="grid2">'+
    '<div class="field"><label>Remind validator after</label><input type="number" id="l_rem" min="1" max="30" step="1" value="'+esc(CONFIG.locum.reminderDays)+'">'+
    '<p class="hint">working days</p></div>'+
    '<div class="field"><label>Escalate after</label><input type="number" id="l_esc" min="1" max="60" step="1" value="'+esc(CONFIG.locum.escalateDays)+'">'+
    '<p class="hint">working days, to Locum queries</p></div>'+
    '</div></div>'+
    '<div class="sec" id="sec-cash" style="margin-top:18px">'+
    '<h2>Cash log</h2>'+
    '<p class="sub">Under the threshold, cash is logged automatically. At or over it, head office must acknowledge.</p>'+
    '<div class="field" style="max-width:220px"><label>Acknowledgement threshold (£)</label><input type="number" id="c_thr" min="0" step="1" value="'+esc(CONFIG.cash.threshold)+'"></div>'+
    '</div>'+
    '</div>'+

    '<div class="sec" id="sec-pin">'+
    '<h2>Security</h2>'+
    '<p class="sub">Three locks on this console: your Google sign-in, the admin allowlist (Global tab of the config sheet), and this PIN.</p>'+
    '<div id="pinmsg"></div>'+
    '<div class="grid3">'+
    '<div class="field"><label>New PIN (4–8 digits)</label><input type="password" id="np1" inputmode="numeric" autocomplete="new-password"></div>'+
    '<div class="field"><label>Confirm new PIN</label><input type="password" id="np2" inputmode="numeric" autocomplete="new-password"></div>'+
    '<div class="field"><label>&nbsp;</label><button type="button" class="btn2" id="pinsave" style="width:100%;padding:12px">Change PIN</button></div>'+
    '</div></div>'
  ));

  bindMain();
  updateCount();
  window.scrollTo(0,0);
}

function bindMain(){
  document.querySelectorAll('[data-rmph]').forEach(function(b){
    b.onclick=function(){
      pull();
      var gone=CONFIG.pharmacies.splice(Number(b.dataset.rmph),1)[0];
      // take its validators with it — orphans would block the save
      if(gone) CONFIG.validators=CONFIG.validators.filter(function(v){return v.pharmacy!==gone.name;});
      renderMain();
    };
  });
  document.querySelectorAll('[data-phact]').forEach(function(c){
    c.onchange=function(){ pull(); CONFIG.pharmacies[Number(c.dataset.phact)].active=c.checked; renderMain(); };
  });
  document.querySelectorAll('[data-rmval]').forEach(function(b){
    b.onclick=function(){ pull(); CONFIG.validators.splice(Number(b.dataset.rmval),1); renderMain(); };
  });
  document.querySelectorAll('[data-vact]').forEach(function(c){
    c.onchange=function(){ pull(); CONFIG.validators[Number(c.dataset.vact)].active=c.checked; renderMain(); };
  });
  document.querySelectorAll('[data-vph]').forEach(function(s){
    s.onchange=function(){ pull(); renderMain(); };
  });
  $('addph').onclick=function(){
    pull();
    var n=$('newph').value.trim();
    if(n) CONFIG.pharmacies.push({name:n, active:true});
    renderMain();
  };
  $('newph').onkeydown=function(e){ if(e.key==='Enter') $('addph').click(); };
  $('addval').onclick=function(){
    pull();
    CONFIG.validators.push({pharmacy:(CONFIG.pharmacies[0]||{}).name||'', name:'', email:'', active:true});
    renderMain();
  };
  $('pinsave').onclick=changePin;
  $('reviewbtn').onclick=function(){ pull(); review(); };
}

function pull(){
  document.querySelectorAll('[data-vname]').forEach(function(el){ CONFIG.validators[Number(el.dataset.vname)].name=el.value.trim(); });
  document.querySelectorAll('[data-vemail]').forEach(function(el){ CONFIG.validators[Number(el.dataset.vemail)].email=el.value.trim(); });
  document.querySelectorAll('[data-vph]').forEach(function(el){ CONFIG.validators[Number(el.dataset.vph)].pharmacy=el.value; });
  document.querySelectorAll('[data-vact]').forEach(function(el){ CONFIG.validators[Number(el.dataset.vact)].active=el.checked; });
  document.querySelectorAll('[data-phact]').forEach(function(el){ CONFIG.pharmacies[Number(el.dataset.phact)].active=el.checked; });
  if($('e_acc')){
    CONFIG.emails.accounts=$('e_acc').value.trim();
    CONFIG.emails.locumHandling=$('e_loc').value.trim();
    CONFIG.emails.cashAck=$('e_cash').value.trim();
    CONFIG.locum.reminderDays=Number($('l_rem').value);
    CONFIG.locum.escalateDays=Number($('l_esc').value);
    CONFIG.cash.threshold=Number($('c_thr').value);
  }
}

function validate(){
  var e=[];
  var names={};
  CONFIG.pharmacies.forEach(function(p){
    if(!p.name) e.push('A pharmacy has no name.');
    if(names[p.name]) e.push('Two pharmacies are both called "'+p.name+'".');
    names[p.name]=true;
  });
  CONFIG.validators.forEach(function(v){
    var who = v.name || v.email || 'a validator';
    if(!v.name) e.push('A validator for '+(v.pharmacy||'no pharmacy')+' has no name.');
    if(!EMAIL_RE.test(v.email)) e.push(who+': that email address is not valid.');
    if(!v.pharmacy) e.push(who+' is not linked to a pharmacy.');
    else if(!CONFIG.pharmacies.some(function(p){return p.name===v.pharmacy;}))
      e.push(who+' is linked to "'+v.pharmacy+'", which is not in the pharmacy list.');
  });
  CONFIG.pharmacies.filter(function(p){return p.active;}).forEach(function(p){
    if(!activeValCount(p.name)) e.push(p.name+' is in use but has no validator switched on — claims there could not be approved by anyone.');
  });
  ['accounts','locumHandling','cashAck'].forEach(function(k){
    var lbl={accounts:'Accounts email',locumHandling:'Locum queries email',cashAck:'Cash log acknowledgement email'}[k];
    if(!EMAIL_RE.test(CONFIG.emails[k])) e.push(lbl+' is not a valid email address.');
  });
  if(!(CONFIG.locum.reminderDays>=1)) e.push('Reminder days must be at least 1.');
  if(!(CONFIG.locum.escalateDays>=1)) e.push('Escalation days must be at least 1.');
  if(CONFIG.locum.escalateDays<=CONFIG.locum.reminderDays)
    e.push('Escalation must come after the reminder — set it higher than '+CONFIG.locum.reminderDays+'.');
  if(!(CONFIG.cash.threshold>=0)) e.push('Cash threshold must be £0 or more.');
  return e;
}

function vkey(v){ return v.pharmacy+' | '+v.name; }
function diff(){
  var out=[];
  var oP={}, nP={};
  ORIG.pharmacies.forEach(function(p){ oP[p.name]=p; });
  CONFIG.pharmacies.forEach(function(p){ nP[p.name]=p; });
  Object.keys(nP).forEach(function(n){
    if(!oP[n]) out.push('Added pharmacy "'+n+'"'+(nP[n].active?'':' (off)'));
    else if(oP[n].active!==nP[n].active) out.push('Pharmacy "'+n+'" turned '+(nP[n].active?'on':'off'));
  });
  Object.keys(oP).forEach(function(n){ if(!nP[n]) out.push('Removed pharmacy "'+n+'"'); });

  var oV={}, nV={};
  ORIG.validators.forEach(function(v){ oV[vkey(v)]=v; });
  CONFIG.validators.forEach(function(v){ nV[vkey(v)]=v; });
  Object.keys(nV).forEach(function(k){
    var n=nV[k], o=oV[k];
    if(!o){ out.push('Added validator '+n.name+' ('+n.pharmacy+', '+n.email+')'+(n.active?'':' — off')); return; }
    if(o.email!==n.email) out.push('Validator '+n.name+' ('+n.pharmacy+') email '+o.email+' → '+n.email);
    if(o.active!==n.active) out.push('Validator '+n.name+' ('+n.pharmacy+') '+(n.active?'switched on':'switched off'));
  });
  Object.keys(oV).forEach(function(k){
    if(!nV[k]) out.push('Removed validator '+oV[k].name+' ('+oV[k].pharmacy+')');
  });

  [['accounts','Accounts email'],['locumHandling','Locum queries email'],['cashAck','Cash log acknowledgement email']]
    .forEach(function(p){
      if(ORIG.emails[p[0]]!==CONFIG.emails[p[0]])
        out.push(p[1]+' '+(ORIG.emails[p[0]]||'(blank)')+' → '+CONFIG.emails[p[0]]);
    });
  if(ORIG.locum.reminderDays!==CONFIG.locum.reminderDays)
    out.push('Validator reminder '+ORIG.locum.reminderDays+' → '+CONFIG.locum.reminderDays+' working days');
  if(ORIG.locum.escalateDays!==CONFIG.locum.escalateDays)
    out.push('Escalation '+ORIG.locum.escalateDays+' → '+CONFIG.locum.escalateDays+' working days');
  if(ORIG.cash.threshold!==CONFIG.cash.threshold)
    out.push('Cash threshold £'+ORIG.cash.threshold+' → £'+CONFIG.cash.threshold);
  return out;
}

function review(){
  var errs=validate();
  if(errs.length) return renderMain(errs);
  var changes=diff();
  if(!changes.length){
    return renderMain(['Nothing has changed yet.']);
  }
  h(shell(
    '<div class="confirmwrap"><div class="sec">'+
    '<h2>Confirm changes</h2>'+
    '<p class="sub">These take effect for every Crest tool as soon as you save. Logged against <b>'+esc(WHO)+'</b>.</p>'+
    '<ul class="chg">'+changes.map(function(c){return '<li>'+esc(c)+'</li>'}).join('')+'</ul>'+
    '<div class="err" id="saveerr"></div>'+
    '<button type="button" class="btn green wide" id="savebtn">Save these '+changes.length+' change'+(changes.length>1?'s':'')+'</button>'+
    '<button type="button" class="btn2" id="backbtn" style="width:100%;margin-top:12px;padding:13px">Go back and edit</button>'+
    '</div></div>'
  ));
  window.scrollTo(0,0);
  $('backbtn').onclick=function(){ renderMain(); };
  $('savebtn').onclick=function(){ save(changes); };
}

function save(changes){
  var btn=$('savebtn'); btn.disabled=true; btn.textContent='Saving…';
  apiPost({action:'adminSave', session:SESSION, config:CONFIG, changes:changes}).then(function(res){
    if(!res.ok){
      if(res.code==='session'){ SESSION=null; return pinPage('Your session timed out — enter the PIN again. Nothing was saved.'); }
      var b=$('saveerr');
      b.innerHTML='<b>Not saved:</b><br>'+(res.errors||[res.message||'Something went wrong — try again.']).map(function(m){return '• '+esc(m)}).join('<br>');
      b.style.display='block';
      btn.disabled=false; btn.textContent='Save these changes';
      return;
    }
    ORIG=clone(CONFIG);
    h(shell(
      '<div class="confirmwrap"><div class="sec center">'+
      '<h2>Saved</h2>'+
      '<div class="banner good">'+changes.length+' change'+(changes.length>1?'s':'')+' saved. Every tool picks '+(changes.length>1?'them':'it')+' up straight away.</div>'+
      '<p class="sub" style="margin-top:10px">Logged against '+esc(WHO)+'.</p>'+
      '<button class="btn wide" id="donebtn">Back to settings</button></div></div>'
    ));
    $('donebtn').onclick=function(){ renderMain(); };
    window.scrollTo(0,0);
  }).catch(function(e){
    var b=$('saveerr');
    b.innerHTML='• '+esc(String(e && e.message || e))+' — nothing was saved.';
    b.style.display='block';
    btn.disabled=false; btn.textContent='Save these changes';
  });
}

function changePin(){
  var a=$('np1').value.trim(), b=$('np2').value.trim(), msg=$('pinmsg');
  function say(cls,t){ msg.innerHTML='<div class="banner '+cls+'">'+esc(t)+'</div>'; }
  if(!/^\d{4,8}$/.test(a)) return say('bad','The PIN must be 4 to 8 digits.');
  if(a!==b) return say('bad','The two PINs do not match.');
  var btn=$('pinsave'); btn.disabled=true; btn.textContent='Changing…';
  apiPost({action:'adminPin', session:SESSION, newPin:a}).then(function(res){
    btn.disabled=false; btn.textContent='Change PIN';
    if(!res.ok){
      if(res.code==='session'){ SESSION=null; return pinPage('Your session timed out — enter the PIN again.'); }
      return say('bad', res.message||'Could not change the PIN — try again.');
    }
    DEFAULT_PIN=false; $('np1').value=''; $('np2').value='';
    say('good','PIN changed. Use the new one next time.');
  }).catch(function(e){
    btn.disabled=false; btn.textContent='Change PIN';
    say('bad',String(e && e.message || e));
  });
}
</script>
