<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crest Pharmacies — Stock Transfer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D47A1; --navy-deep:#0A3A85; --navy-ink:#082E68;
  --accent:#4F88E4; --accent-soft:#EAF1FC;
  --bg:#F4F7FC; --card:#FFFFFF; --border:#DCE3EF; --border-light:#E9EEF6;
  --green:#1E9E5A; --red:#D7382B; --amber:#B45309;
  --shadow:0 1px 2px rgba(13,47,104,.05),0 2px 10px rgba(13,47,104,.05);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#1b2537;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
.top{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px}
.top img{height:34px;width:34px;border-radius:8px;background:#fff;padding:3px}
.top .t1{font-weight:800;font-size:16px;letter-spacing:.2px}
.top .t2{font-size:12px;opacity:.85}
.wrap{max-width:560px;margin:0 auto;padding:16px 14px 60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-top:14px}
h2{margin:2px 0 6px;font-size:20px;color:var(--navy-ink)}
h3{margin:18px 0 6px;font-size:16px;color:var(--navy-ink)}
p.sub{color:#59647d;margin:0 0 6px;font-size:14px}
label{display:block;font-weight:700;margin:16px 0 6px;font-size:14.5px;color:var(--navy-ink)}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;padding:13px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;background:#fff;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);border-color:var(--accent)}
.hint{color:#59647d;font-size:13px;margin:4px 0 0;line-height:1.45}
.warn{background:#FFF7ED;border:1px solid #FDBA74;color:var(--amber);border-radius:10px;padding:10px 12px;font-size:13.5px;margin-top:8px;line-height:1.5}
.err{background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B;border-radius:10px;padding:12px;margin:14px 0;display:none;font-size:14.5px;line-height:1.6}
.btn{background:var(--navy);color:#fff;border:0;padding:16px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:22px;width:100%;font-family:inherit}
.btn:active{background:var(--navy-deep)}
.btn[disabled]{opacity:.55}
.btn.green{background:var(--green)}
.btn.red{background:var(--red)}
.check{display:flex;gap:10px;align-items:flex-start;margin:12px 0;font-size:14.5px}
.check input{width:20px;height:20px;margin-top:1px;flex:none}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.seg .opt{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:center;background:#fff;user-select:none}
.seg .opt b{display:block;font-size:15px;color:var(--navy-ink)}
.seg .opt span{font-size:12.5px;color:#59647d}
.seg .opt.on{border-color:var(--navy);background:var(--accent-soft)}
.kv{width:100%;margin:8px 0;font-size:15px}
.kv td{padding:5px 0;vertical-align:top}
.kv td:first-child{color:#59647d;padding-right:14px;white-space:nowrap}
.banner{border-radius:12px;padding:14px;font-size:15px;margin-top:14px}
.banner.info{background:var(--accent-soft);color:var(--navy-ink)}
.banner.good{background:#DCFCE7;color:#14532D}
.banner.bad{background:#FEE2E2;color:#991B1B}
.center{text-align:center}
.bigref{font-size:26px;font-weight:800;color:var(--navy);letter-spacing:.5px}
.amt{font-size:28px;font-weight:800;color:var(--navy);margin:6px 0}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12.5px;font-weight:700;letter-spacing:.3px;margin:2px}
.badge.loan{background:#FEF3C7;color:#92400E}
.badge.transfer{background:#DBEAFE;color:#1E40AF}
.badge.cd{background:#FEE2E2;color:#991B1B}
.badge.fridge{background:#E0F2FE;color:#075985}
.badge.pend{background:#FEF3C7;color:#92400E}
.total{font-size:18px;margin-top:16px;color:var(--navy-ink)}
.spin{display:inline-block;width:22px;height:22px;border:3px solid var(--accent-soft);border-top-color:var(--navy);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.demo{background:#082E68;color:#cfe0ff;font-size:12.5px;text-align:center;padding:7px 12px}
.foot{margin-top:34px;color:#8a93a8;font-size:12.5px;text-align:center}
details{margin-top:14px}
summary{cursor:pointer;color:var(--red);font-weight:700;font-size:15px}
</style>
</head>

<script>
// ===========================================================================
// Crest Pharmacies — Inter-branch Stock Transfer Note
// The phone call / WhatsApp coordination stays exactly as it is. This page
// only writes down what moved, after the fact: the SENDING branch logs the
// transfer in ~20 seconds, the RECEIVING branch confirms with one tap.
// Both sides agreed => the ledger line is trustworthy.
//
//   TRANSFER  = receiver keeps it. Settled at COST. Feeds the monthly
//               per-branch-pair netting journal (net zero at company level).
//   LOAN      = return in kind expected. No P&L effect while open; the
//               backend nudges and auto-converts to a transfer if not
//               returned in 30 days. A return is logged as a new note with
//               "return of loan" referencing the original.
//
// BACKEND CONTRACT (same Apps Script, new tab "Transfers"):
//   GET  ?action=transfermeta                -> {ok, branches:[], loanConvertDays:30}
//   POST {action:'transferlog', payload}     -> {ok, ref, status:'PENDING'}
//        (emails the receiving branch a confirm token link)
//   GET  ?action=transferentry&token=..      -> {ok, entry} | {ok:false, code:'processed'|'expired'|'invalid'}
//   POST {action:'receive', token}           -> {ok, ref, status:'RECEIVED'}
//   POST {action:'dispute', token, reason}   -> {ok, ref, status:'DISPUTED'}
//   Month-end (time trigger): one netting email per branch pair for accounts.
// ===========================================================================
var API_URL = '__API_URL__';
var DEMO = API_URL.indexOf('__') === 0;

var $app = document.getElementById('app');
function h(html){ $app.innerHTML = html; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(n){ return Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }

function apiGet(params){
  if(DEMO) return demo('GET', params);
  var q = Object.keys(params).map(function(k){return k+'='+encodeURIComponent(params[k])}).join('&');
  return fetch(API_URL+'?'+q).then(function(r){return r.text()}).then(JSON.parse);
}
function apiPost(body){
  if(DEMO) return demo('POST', body);
  return fetch(API_URL,{method:'POST',body:JSON.stringify(body)}).then(function(r){return r.text()}).then(JSON.parse);
}
function fatal(msg){
  h('<div class="card"><div class="banner bad">'+esc(msg)+'</div>'+
    '<button class="btn" onclick="location.reload()">Try again</button></div>');
}

var META=null, TYPE='transfer';

// --- router ---
var TOKEN = new URLSearchParams(location.search).get('token');
if(DEMO) document.getElementById('demobar').style.display='block';
if (!DEMO && API_URL.indexOf('__')===0){ fatal('Setup not finished: the API URL has not been configured yet.'); }
else if (TOKEN){ receivePage(TOKEN); } else { formPage(); }

// ===========================================================================
// SENDING BRANCH — LOG THE TRANSFER
// ===========================================================================
function formPage(){
  apiGet({action:'transfermeta'}).then(function(meta){
    if(!meta.ok) return fatal('Could not load the form. Please try again in a minute.');
    META=meta; if(!META.loanConvertDays) META.loanConvertDays=30;
    renderForm();
  }).catch(function(){ fatal('No connection — check your signal and try again.'); });
}

function renderForm(){
  h(
  '<div class="card" id="formwrap">'+
  '<h2>Log a stock transfer</h2>'+
  '<p class="sub">Sorted an emergency for another branch? Great — write it down here while the driver is on the way, so both tills and both P&amp;Ls stay right. Takes 20 seconds.</p>'+
  '<div class="err" id="errbox"></div>'+
  '<label>Your name</label><input type="text" id="f_name" autocomplete="name">'+
  '<label>From (your branch — the sender)</label><select id="f_from"><option value="">— select —</option></select>'+
  '<label>To (the branch receiving it)</label><select id="f_to"><option value="">— select —</option></select>'+
  '<label>Medicine / item</label><input type="text" id="f_item" placeholder="e.g. Amoxicillin 500mg caps, 21-pack">'+
  '<label>Quantity (packs)</label><input type="number" id="f_qty" step="1" min="1" inputmode="numeric">'+
  '<label>Cost price per pack (£)</label><input type="number" id="f_cost" step="0.01" min="0.01" inputmode="decimal">'+
  '<p class="hint">What YOUR branch paid, not the retail price — transfers move at cost.</p>'+
  '<div class="total" id="total"></div>'+
  '<label>Keeping it, or lending it?</label>'+
  '<div class="seg">'+
    '<div class="opt on" id="opt_transfer"><b>Transfer</b><span>they keep it — settled at cost</span></div>'+
    '<div class="opt" id="opt_loan"><b>Loan</b><span>they return the same item</span></div>'+
  '</div>'+
  '<p class="hint" id="typehint"></p>'+
  '<div class="check"><input type="checkbox" id="f_return"><span>This is the <b>return of an earlier loan</b></span></div>'+
  '<div id="retwrap" style="display:none"><label>Original loan reference</label><input type="text" id="f_retref" placeholder="e.g. TX-AB123"></div>'+
  '<div class="check"><input type="checkbox" id="f_cd"><span>Controlled drug (Schedule 2/3)</span></div>'+
  '<div class="warn" id="cdwarn" style="display:none"><b>Controlled drug:</b> complete the requisition (FP10CDF) and make the CD register entries at <b>both</b> branches within 24 hours, as usual. This log is extra — it does not replace either.</div>'+
  '<div class="check"><input type="checkbox" id="f_fridge"><span>Fridge line (2–8°C)</span></div>'+
  '<div class="warn" id="fridgewarn" style="display:none"><b>Fridge line:</b> use a proper cold-chain transit container for the journey — not a domestic cool box.</div>'+
  '<label>Who is moving it?</label><select id="f_transport"><option value="">— select —</option><option>Our driver is delivering</option><option>Their driver is collecting</option><option>Other (staff member / courier)</option></select>'+
  '<label>Date</label><input type="date" id="f_date">'+
  '<label>Notes (optional)</label><textarea id="f_notes" rows="2" placeholder="e.g. patient waiting on Rx, agreed with Sam"></textarea>'+
  '<button type="button" class="btn" id="submitbtn">Log transfer</button>'+
  '<p class="hint" style="margin-top:10px">The receiving branch gets a link to tap "Received" — the ledger line is only final once they confirm.</p>'+
  '</div>');

  var $=function(id){return document.getElementById(id)};
  META.branches.forEach(function(b){
    ['f_from','f_to'].forEach(function(id){var o=document.createElement('option');o.textContent=b;$(id).appendChild(o)});
  });
  $('f_date').value=todayISO();
  $('f_qty').oninput=recalc; $('f_cost').oninput=recalc;
  $('opt_transfer').onclick=function(){setType('transfer')};
  $('opt_loan').onclick=function(){setType('loan')};
  $('f_return').onchange=function(){$('retwrap').style.display=this.checked?'block':'none';};
  $('f_cd').onchange=function(){$('cdwarn').style.display=this.checked?'block':'none';};
  $('f_fridge').onchange=function(){$('fridgewarn').style.display=this.checked?'block':'none';};
  $('submitbtn').onclick=submit;
  setType('transfer'); recalc();
}
function setType(t){
  TYPE=t;
  document.getElementById('opt_transfer').classList.toggle('on',t==='transfer');
  document.getElementById('opt_loan').classList.toggle('on',t==='loan');
  document.getElementById('typehint').innerHTML = t==='loan'
    ? 'Loan: no cost moves between branches while it\'s open. If it isn\'t returned within '+META.loanConvertDays+' days it automatically becomes a transfer at cost.'
    : 'Transfer: the cost moves to the receiving branch in this month\'s netting — your branch is made whole.';
}
function recalc(){
  var q=Number((document.getElementById('f_qty')||{}).value)||0;
  var c=Number((document.getElementById('f_cost')||{}).value)||0;
  var el=document.getElementById('total');if(!el)return;
  el.innerHTML=(q>0&&c>0)?('<b>Value at cost: '+q+' × £'+money(c)+' = £'+money(q*c)+'</b>'):'';
}
function showErrors(msgs){
  var b=document.getElementById('errbox');
  b.innerHTML='<b>Please fix:</b><br>'+msgs.map(function(m){return '• '+esc(m)}).join('<br>');
  b.style.display='block';window.scrollTo({top:0,behavior:'smooth'});
}
function submit(){
  var $=function(id){return document.getElementById(id)};
  var e=[];
  if(!$('f_name').value.trim())e.push('Your name');
  if(!$('f_from').value)e.push('From branch');
  if(!$('f_to').value)e.push('To branch');
  if($('f_from').value&&$('f_from').value===$('f_to').value)e.push('From and To must be different branches');
  if(!$('f_item').value.trim())e.push('Medicine / item');
  var qty=Number($('f_qty').value);if(!(qty>0))e.push('Quantity');
  var cost=Number($('f_cost').value);if(!(cost>0))e.push('Cost price per pack (£)');
  if($('f_return').checked&&!$('f_retref').value.trim())e.push('Original loan reference');
  if(!$('f_transport').value)e.push('Who is moving it');
  if(!$('f_date').value)e.push('Date');
  if(e.length){showErrors(e);return;}
  $('errbox').style.display='none';
  var btn=$('submitbtn');btn.disabled=true;btn.textContent='Logging…';
  var payload={
    sender:$('f_name').value.trim(), from:$('f_from').value, to:$('f_to').value,
    item:$('f_item').value.trim(), qty:qty, unitCost:cost, total:Math.round(qty*cost*100)/100,
    type:TYPE, returnOfLoan:$('f_return').checked?$('f_retref').value.trim():'',
    cd:$('f_cd').checked, fridge:$('f_fridge').checked,
    transport:$('f_transport').value, date:$('f_date').value, notes:$('f_notes').value.trim()
  };
  apiPost({action:'transferlog', payload:payload}).then(function(res){
    if(!res.ok){showErrors(res.errors||[res.message||'Something went wrong — try again.']);btn.disabled=false;btn.textContent='Log transfer';return;}
    h('<div class="card center"><h2>Transfer logged</h2>'+
      '<p>Reference</p><p class="bigref">'+esc(res.ref)+'</p>'+
      '<p class="amt">£'+money(payload.total)+' <span style="font-size:14px;color:#59647d;font-weight:600">at cost</span></p>'+
      '<p><span class="badge '+(payload.type==='loan'?'loan':'transfer')+'">'+(payload.type==='loan'?'LOAN — return expected':'TRANSFER — they keep it')+'</span>'+
      (payload.cd?'<span class="badge cd">CD</span>':'')+(payload.fridge?'<span class="badge fridge">FRIDGE</span>':'')+'</p>'+
      '<div class="banner info"><b>'+esc(payload.to)+'</b> has been sent a link to confirm they received it. The ledger line is final once they tap Received.'+
      (payload.cd?'<br><br><b>Don\'t forget:</b> FP10CDF requisition + CD register entries at both branches.':'')+'</div>'+
      '<button class="btn" onclick="location.reload()">Log another transfer</button></div>');
    window.scrollTo(0,0);
  }).catch(function(){
    showErrors(['No connection — this was NOT logged. Check your signal and press Log again.']);
    btn.disabled=false;btn.textContent='Log transfer';
  });
}

// ===========================================================================
// RECEIVING BRANCH — CONFIRM RECEIPT
// ===========================================================================
function receivePage(token){
  apiGet({action:'transferentry',token:token}).then(function(c){
    if(!c.ok){
      if(c.code==='processed') return h('<div class="card"><div class="banner info">Transfer <b>'+esc(c.ref)+'</b> was already <b>'+esc(c.status)+'</b>'+(c.decidedAt?' on '+new Date(c.decidedAt).toLocaleString('en-GB'):'')+'.</div><p class="hint">No further action needed.</p></div>');
      if(c.code==='expired') return h('<div class="card"><div class="banner bad">This link has expired.</div><p class="hint">Ask the sending branch to re-log it, or contact head office.</p></div>');
      return h('<div class="card"><div class="banner bad">This link is not valid.</div></div>');
    }
    renderReceive(token,c.entry||c);
  }).catch(function(){ fatal('No connection — check your signal and try again.'); });
}

function renderReceive(token,c,errMsg){
  h('<div class="card">'+
    (errMsg?'<div class="banner bad">'+esc(errMsg)+'</div>':'')+
    '<h2>Incoming stock '+esc(c.ref)+'</h2>'+
    '<p class="sub">Check the box that arrived against this note, then confirm. Only confirmed transfers go in the books.</p>'+
    '<p class="center"><span class="badge '+(c.type==='loan'?'loan':'transfer')+'">'+(c.type==='loan'?'LOAN — you return the same item':'TRANSFER — you keep it')+'</span>'+
    (c.cd?'<span class="badge cd">CONTROLLED DRUG</span>':'')+(c.fridge?'<span class="badge fridge">FRIDGE LINE</span>':'')+'</p>'+
    '<table class="kv">'+
    '<tr><td>Item</td><td><b>'+esc(c.item)+'</b></td></tr>'+
    '<tr><td>Quantity</td><td>'+esc(String(c.qty))+' pack(s)</td></tr>'+
    '<tr><td>Value at cost</td><td><b>£'+money(c.total)+'</b> ('+esc(String(c.qty))+' × £'+money(c.unitCost)+')</td></tr>'+
    '<tr><td>From</td><td>'+esc(c.from)+' — logged by '+esc(c.sender)+'</td></tr>'+
    '<tr><td>To</td><td>'+esc(c.to)+'</td></tr>'+
    '<tr><td>Transport</td><td>'+esc(c.transport)+'</td></tr>'+
    '<tr><td>Date</td><td>'+esc(c.date)+'</td></tr>'+
    (c.returnOfLoan?'<tr><td>Returns loan</td><td>'+esc(c.returnOfLoan)+'</td></tr>':'')+
    (c.notes?'<tr><td>Notes</td><td>'+esc(c.notes)+'</td></tr>':'')+
    '</table>'+
    (c.cd?'<div class="warn"><b>Controlled drug:</b> make your CD register receipt entry within 24 hours. This confirmation does not replace it.</div>':'')+
    (c.fridge?'<div class="warn"><b>Fridge line:</b> check it travelled cold and refrigerate immediately.</div>':'')+
    '<button class="btn green" id="recvbtn">Received — all correct</button>'+
    '<details><summary>Something\'s wrong…</summary>'+
    '<label>What\'s wrong? (the sending branch sees this)</label>'+
    '<textarea id="dreason" rows="3" placeholder="e.g. only 8 packs arrived, note says 10"></textarea>'+
    '<button class="btn red" id="dispbtn">Report a problem</button>'+
    '</details>'+
    '</div>');

  document.getElementById('recvbtn').onclick=function(){ decide(token,'receive','',c); };
  document.getElementById('dispbtn').onclick=function(){
    var reason=document.getElementById('dreason').value.trim();
    if(!reason){renderReceive(token,c,'Please say what\'s wrong — the sending branch needs to know.');return;}
    decide(token,'dispute',reason,c);
  };
}

function decide(token,action,reason,c){
  var rb=document.getElementById('recvbtn'),db=document.getElementById('dispbtn');
  if(rb)rb.disabled=true; if(db)db.disabled=true;
  (action==='receive'?rb:db).textContent='Working…';
  apiPost({action:action,token:token,reason:reason}).then(function(res){
    if(!res.ok){
      if(res.code==='processed') return h('<div class="card"><div class="banner info">Transfer <b>'+esc(res.ref)+'</b> was already <b>'+esc(res.status)+'</b>.</div></div>');
      return renderReceive(token,c,res.message||'Something went wrong — try again.');
    }
    if(res.status==='RECEIVED'){
      h('<div class="card center"><h2>Confirmed</h2>'+
        '<div class="banner good"><b>'+esc(res.ref)+'</b> is in the books: '+esc(c.item)+', £'+money(c.total)+' at cost, '+esc(c.from)+' → '+esc(c.to)+'.'+
        (c.type==='loan'?' It\'s recorded as a loan — remember to send the same item back.':' It\'ll appear in this month\'s netting for accounts.')+'</div>'+
        '<p class="hint">You can close this page.</p></div>');
    } else {
      h('<div class="card center"><h2>Problem reported</h2>'+
        '<div class="banner info"><b>'+esc(res.ref)+'</b> is on hold — '+esc(c.from)+' has been sent your note and will sort it out. Nothing goes in the books until it\'s resolved.</div>'+
        '<p class="hint">You can close this page.</p></div>');
    }
    window.scrollTo(0,0);
  }).catch(function(){ renderReceive(token,c,'No connection — nothing was changed. Try again.'); });
}

// ===========================================================================
// DEMO BACKEND (only when API_URL is not configured) — click through the
// whole flow with no server; the confirm link works via localStorage.
// ===========================================================================
function demo(method, p){
  return new Promise(function(resolve){
    setTimeout(function(){ resolve(demoHandle(method,p)); }, 300);
  });
}
function demoStore(token,obj){ try{ localStorage.setItem('transfer_'+token, JSON.stringify(obj)); }catch(e){} }
function demoLoad(token){ try{ return JSON.parse(localStorage.getItem('transfer_'+token)); }catch(e){ return null; } }
function demoHandle(method,p){
  if(method==='GET' && p.action==='transfermeta'){
    return {ok:true, loanConvertDays:30,
      branches:['Crest — High Street','Crest — Riverside','Crest — Market Square','Crest — Station Road']};
  }
  if(method==='POST' && p.action==='transferlog'){
    var pl=p.payload;
    var ref='TX-'+Math.random().toString(36).slice(2,7).toUpperCase();
    var token='demo'+Math.random().toString(36).slice(2,9);
    var entry={ref:ref, status:'PENDING'};
    for(var k in pl) entry[k]=pl[k];
    demoStore(token, entry);
    console.log('%c[DEMO] Receiving-branch confirm link:', 'color:#0D47A1;font-weight:bold',
      location.pathname+'?token='+token);
    return {ok:true, ref:ref, status:'PENDING', _demoToken:token};
  }
  if(method==='GET' && p.action==='transferentry'){
    var c=demoLoad(p.token);
    if(!c) return {ok:false, code:'invalid'};
    if(c.status!=='PENDING') return {ok:false, code:'processed', ref:c.ref, status:c.status};
    return {ok:true, entry:c};
  }
  if(method==='POST' && (p.action==='receive'||p.action==='dispute')){
    var c2=demoLoad(p.token);
    if(!c2) return {ok:false, code:'invalid'};
    if(c2.status!=='PENDING') return {ok:false, code:'processed', ref:c2.ref, status:c2.status};
    c2.status = p.action==='receive' ? 'RECEIVED' : 'DISPUTED';
    c2.decidedAt = new Date().toISOString();
    demoStore(p.token, c2);
    return {ok:true, ref:c2.ref, status:c2.status};
  }
  return {ok:false, message:'Unknown action'};
}
</script>
