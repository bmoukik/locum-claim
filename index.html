<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crest Pharmacies — Locum Payments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D47A1; --navy-deep:#0A3A85; --navy-ink:#082E68;
  --accent:#4F88E4; --accent-soft:#EAF1FC;
  --bg:#F4F7FC; --card:#FFFFFF; --border:#DCE3EF; --border-light:#E9EEF6;
  --green:#1E9E5A; --red:#D7382B; --amber:#B45309;
  --shadow:0 1px 2px rgba(13,47,104,.05),0 2px 10px rgba(13,47,104,.05);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#1b2537;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
.top{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px}
.top img{height:34px;width:34px;border-radius:8px;background:#fff;padding:3px}
.top .t1{font-weight:800;font-size:16px;letter-spacing:.2px}
.top .t2{font-size:12px;opacity:.85}
.wrap{max-width:560px;margin:0 auto;padding:16px 14px 60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-top:14px}
h2{margin:2px 0 6px;font-size:20px;color:var(--navy-ink)}
h3{margin:18px 0 6px;font-size:16px;color:var(--navy-ink)}
p.sub{color:#59647d;margin:0 0 6px;font-size:14px}
label{display:block;font-weight:700;margin:16px 0 6px;font-size:14.5px;color:var(--navy-ink)}
input[type=text],input[type=email],input[type=tel],input[type=number],select,textarea{
  width:100%;padding:13px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;background:#fff;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);border-color:var(--accent)}
.hint{color:#59647d;font-size:13px;margin:4px 0 0;line-height:1.45}
.warn{background:#FFF7ED;border:1px solid #FDBA74;color:var(--amber);border-radius:10px;padding:10px 12px;font-size:13.5px;margin-top:8px}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.day{padding:11px 0;text-align:center;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;user-select:none;font-size:15px;background:#fff;font-weight:600}
.day.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.hourrow{display:flex;align-items:center;gap:12px;margin-top:10px}
.hourrow .d{width:96px;font-weight:700;color:var(--navy-ink)}
.hourrow input{width:120px}
.mblock{border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-top:14px;background:#FBFCFF}
.err{background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B;border-radius:10px;padding:12px;margin:14px 0;display:none;font-size:14.5px;line-height:1.6}
.btn{background:var(--navy);color:#fff;border:0;padding:16px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:22px;width:100%;font-family:inherit}
.btn:active{background:var(--navy-deep)}
.btn[disabled]{opacity:.55}
.btn.green{background:var(--green)}
.btn.red{background:var(--red)}
.btn2{background:#fff;color:var(--navy);border:1.5px dashed var(--accent);padding:12px 16px;border-radius:10px;cursor:pointer;margin-top:12px;font-size:15px;font-weight:600;font-family:inherit;width:100%}
.check{display:flex;gap:10px;align-items:flex-start;margin:12px 0;font-size:14.5px}
.check input{width:20px;height:20px;margin-top:1px;flex:none}
.total{font-size:18px;margin-top:16px;color:var(--navy-ink)}
.kv{width:100%;margin:8px 0;font-size:15px}
.kv td{padding:5px 0;vertical-align:top}
.kv td:first-child{color:#59647d;padding-right:14px;white-space:nowrap}
table.grid{border-collapse:collapse;width:100%;margin-top:6px;font-size:14.5px}
table.grid th,table.grid td{border:1px solid var(--border);padding:7px 10px;text-align:left}
table.grid th{background:var(--accent-soft);color:var(--navy-ink)}
.banner{border-radius:12px;padding:14px;font-size:15px;margin-top:14px}
.banner.info{background:var(--accent-soft);color:var(--navy-ink)}
.banner.good{background:#DCFCE7;color:#14532D}
.banner.bad{background:#FEE2E2;color:#991B1B}
.flag{color:var(--amber);margin:4px 0}
.center{text-align:center}
.bigref{font-size:26px;font-weight:800;color:var(--navy);letter-spacing:.5px}
.spin{display:inline-block;width:22px;height:22px;border:3px solid var(--accent-soft);border-top-color:var(--navy);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.demo{background:#082E68;color:#cfe0ff;font-size:12.5px;text-align:center;padding:7px 12px}
.foot{margin-top:34px;color:#8a93a8;font-size:12.5px;text-align:center}
details{margin-top:14px}
summary{cursor:pointer;color:var(--red);font-weight:700;font-size:15px}
.flagbox{background:#FFF7ED;border:1px solid #FDBA74;border-radius:10px;padding:10px 12px;margin-top:8px}
.flagbox .flag{margin:0;font-size:14px;line-height:1.5}
.flagbox .flag + .flag{margin-top:8px}
.bank{background:#FBFCFF;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:8px}
.bank .num{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:18px;font-weight:700;color:var(--navy-ink);letter-spacing:1px}
.stamp{background:#DCFCE7;color:#14532D;border-radius:10px;padding:10px 12px;font-size:14px;margin-top:8px}
</style>
</head>

<script>
// ===========================================================================
// Crest Pharmacies — Locum payment claim
// Locum submits hours/rate/bank details -> the chosen validator approves
// (an explicit tap, recorded against them) -> accounts pay and tap Paid.
// Nothing is ever approved automatically: money moving needs a positive,
// logged action by a named person. A slow validator gets a reminder, then an
// escalation — never an auto-approval.
//
// BACKEND CONTRACT (shared Apps Script; pharmacies/validators/emails/timings
// all come from the shared config — see BACKEND_SPEC.md):
//   GET  ?action=meta                 -> {ok, pharmacies:[], validators:{ph:[names]}, months:[{label,maxDay}]}
//   POST {action:'submit', payload}   -> {ok, ref, total, hours, validator}
//                                      | {ok:false, errors:[]}   <- incl. self-approval block
//   GET  ?action=claim&token=..       -> {ok, view:'validator'|'accounts', ...claim}
//                                      | {ok:false, code:'processed'|'expired'|'invalid'}
//   POST {action:'approve', token}          -> {ok, ref, status:'APPROVED', locum}
//   POST {action:'reject',  token, reason}  -> {ok, ref, status:'REJECTED', locum}
//   POST {action:'paid',    token, by, method?} -> {ok, ref, status:'PAID', locum}
//        method 'cash' = a cash-log entry covered it (no bank transfer);
//        the cash-log app can also settle a claim directly (spec §6a)
//   POST {action:'raise',   token, by, to, reason} -> {ok, ref, status:'RAISED', locum}
//
// Two server-side checks raise flags both the validator and accounts see:
//   - days that overlap a claim already sent in (possible repeat)
//   - bank details that changed since this locum's last claim
// Neither blocks the claim; both ask a human to look.
// ===========================================================================
var API_URL = 'https://script.google.com/macros/s/AKfycbzo_SG8akvk_7P82WXMGmAuHfeTcU_xZj1nahQSJ8x9h24445oO1NyWIJhwPDvB2kc0/exec';
var DEMO = API_URL.indexOf('__') === 0;

var $app = document.getElementById('app');
function h(html){ $app.innerHTML = html; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(n){ return Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function ordinal(d){ var s=['th','st','nd','rd'],v=d%100; return d+(s[(v-20)%10]||s[v]||s[0]); }

// --- API (plain fetch; no Google cookies cross-origin => no account glitch) ---
function apiGet(params){
  if(DEMO) return demo('GET', params);
  var q = Object.keys(params).map(function(k){return k+'='+encodeURIComponent(params[k])}).join('&');
  return fetch(API_URL+'?'+q).then(function(r){return r.text()}).then(JSON.parse);
}
function apiPost(body){
  if(DEMO) return demo('POST', body);
  return fetch(API_URL,{method:'POST',body:JSON.stringify(body)}).then(function(r){return r.text()}).then(JSON.parse);
}
function fatal(msg){
  h('<div class="card"><div class="banner bad">'+esc(msg)+'</div>'+
    '<button class="btn" onclick="location.reload()">Try again</button></div>');
}

// --- router ---
var TOKEN = new URLSearchParams(location.search).get('token');
if(DEMO) document.getElementById('demobar').style.display='block';
if (TOKEN){ claimPage(TOKEN); } else { formPage(); }

// ===========================================================================
// LOCUM FORM
// ===========================================================================
var META=null, blockN=0;

function formPage(){
  apiGet({action:'meta'}).then(function(meta){
    if(!meta.ok) return fatal('Could not load the form. Please try again in a minute.');
    META=meta; renderForm();
  }).catch(function(){ fatal('No connection — check your signal and try again.'); });
}

function renderForm(){
  h(
  '<div class="card" id="formwrap">'+
  '<h2>Locum payment claim</h2>'+
  '<p class="sub">Fill this in after your shifts. Your claim goes to the pharmacy validator you select, and once approved it is passed to accounts for payment.</p>'+
  '<div class="err" id="errbox"></div>'+
  '<label>Full name</label><input type="text" id="f_name" autocomplete="name">'+
  '<label>Email address</label><input type="email" id="f_email" autocomplete="email">'+
  '<p class="hint">Your confirmation and payment updates go here — double-check it.</p>'+
  '<label>Phone number</label><input type="tel" id="f_phone" autocomplete="tel">'+
  '<label>Role you worked</label><select id="f_role"><option value="">— select —</option><option>Pharmacist</option><option>Dispenser</option><option>Driver</option><option>Other</option></select>'+
  '<div id="gphc_wrap" style="display:none"><label>GPhC registration number</label><input type="text" id="f_gphc" inputmode="numeric" maxlength="7"><p class="hint">7 digits.</p></div>'+
  '<div id="other_wrap" style="display:none"><label>Describe the work</label><input type="text" id="f_roleother"></div>'+
  '<div class="check"><input type="checkbox" id="f_rtw"><span>I confirm I have the right to work in the UK</span></div>'+
  '<label>Pharmacy you worked at</label><select id="f_pharmacy"><option value="">— select —</option></select>'+
  '<label>Who should validate this claim?</label><select id="f_validator"><option value="">— select pharmacy first —</option></select>'+
  '<div class="warn">Important: your payment cannot be processed unless the correct validator is selected. If unsure, ask the pharmacy.</div>'+
  '<label>Agreed rate (£ per hour)</label><input type="number" id="f_rate" step="0.01" min="1" inputmode="decimal">'+
  '<p class="hint">Enter the rate you agreed with the pharmacy — the validator checks it.</p>'+
  '<div id="months"></div>'+
  '<button type="button" class="btn2" id="addmonth">+ Add another month</button>'+
  '<div class="total" id="total"></div>'+
  '<h3>Payment details</h3>'+
  '<p class="hint">Only seen by accounts — never by the validator.</p>'+
  '<label>Account holder name</label><input type="text" id="f_bankname">'+
  '<label>Sort code (6 digits)</label><input type="text" id="f_sort" inputmode="numeric" maxlength="8">'+
  '<label>Account number (8 digits)</label><input type="text" id="f_acct" inputmode="numeric" maxlength="8">'+
  '<label>Confirm account number</label><input type="text" id="f_acct2" inputmode="numeric" maxlength="8">'+
  '<label>Anything else we should know? (optional)</label><textarea id="f_notes" rows="2"></textarea>'+
  '<button type="button" class="btn" id="submitbtn">Submit claim</button>'+
  '</div>');

  var $=function(id){return document.getElementById(id)};
  META.pharmacies.forEach(function(p){var o=document.createElement('option');o.textContent=p;$('f_pharmacy').appendChild(o)});
  $('f_pharmacy').onchange=function(){
    var v=$('f_validator');v.innerHTML='';
    var list=META.validators[this.value]||[];
    if(!list.length){v.innerHTML='<option>Head Office</option>';return;}
    if(list.length>1){var d=document.createElement('option');d.value='';d.textContent='— select —';v.appendChild(d);}
    list.forEach(function(n){var o=document.createElement('option');o.textContent=n;v.appendChild(o)});
  };
  // ?ph=<name> (from the printed QR poster) pre-selects the pharmacy —
  // still changeable if someone scanned the wrong branch's poster
  var pre=new URLSearchParams(location.search).get('ph');
  if(pre && META.pharmacies.indexOf(pre)>=0){
    $('f_pharmacy').value=pre;
    $('f_pharmacy').onchange.call($('f_pharmacy'));
  }
  $('f_role').onchange=function(){
    var r=this.value;
    $('gphc_wrap').style.display=(r==='Pharmacist')?'block':'none';
    $('other_wrap').style.display=(r==='Other')?'block':'none';
  };
  $('f_rate').oninput=recalc;
  $('addmonth').onclick=addMonthBlock;
  $('submitbtn').onclick=submit;
  addMonthBlock();
}

function addMonthBlock(){
  if(document.querySelectorAll('.mblock').length>=META.months.length)return;
  var i=blockN++;
  var div=document.createElement('div');div.className='mblock';div.id='mb'+i;
  var opts=META.months.map(function(m){return '<option data-max="'+m.maxDay+'">'+esc(m.label)+'</option>'}).join('');
  div.innerHTML='<label style="margin-top:2px">Month</label><select id="mm'+i+'">'+opts+'</select>'+
    '<label>Tap every day you worked</label><div class="days" id="md'+i+'"></div>'+
    '<div class="check" style="margin-top:14px"><input type="checkbox" id="sm'+i+'"><span><b>Same hours every day</b></span></div>'+
    '<div id="sw'+i+'" style="display:none"><div class="hourrow"><span class="d">Hours per day</span><input type="number" id="sh'+i+'" step="0.25" min="0.25" max="24" placeholder="hours" inputmode="decimal"></div></div>'+
    '<div id="mh'+i+'"></div>'+
    (i>0?'<button type="button" class="btn2" onclick="removeBlock('+i+')">Remove this month</button>':'');
  document.getElementById('months').appendChild(div);
  document.getElementById('mm'+i).onchange=function(){buildDays(i)};
  document.getElementById('sm'+i).onchange=function(){
    document.getElementById('sw'+i).style.display=this.checked?'block':'none';
    document.getElementById('mh'+i).style.display=this.checked?'none':'block';
    recalc();
  };
  document.getElementById('sh'+i).oninput=recalc;
  buildDays(i);
}
function removeBlock(i){var el=document.getElementById('mb'+i);el.parentNode.removeChild(el);recalc();}
function buildDays(i){
  var sel=document.getElementById('mm'+i);
  var max=Number(sel.options[sel.selectedIndex].getAttribute('data-max'));
  var grid=document.getElementById('md'+i);grid.innerHTML='';
  document.getElementById('mh'+i).innerHTML='';
  for(var d=1;d<=max;d++){(function(d){
    var b=document.createElement('div');b.className='day';b.textContent=d;
    b.onclick=function(){b.classList.toggle('on');toggleHour(i,d,b.classList.contains('on'))};
    grid.appendChild(b);
  })(d);}
  recalc();
}
function toggleHour(i,d,on){
  var wrap=document.getElementById('mh'+i);var id='h'+i+'_'+d;
  if(on){
    var row=document.createElement('div');row.className='hourrow';row.id='r'+id;
    row.innerHTML='<span class="d">'+ordinal(d)+'</span><input type="number" id="'+id+'" step="0.25" min="0.25" max="24" placeholder="hours" inputmode="decimal">';
    var ins=null;[].slice.call(wrap.children).forEach(function(r){var dd=Number(r.id.split('_')[1]);if(dd>d&&!ins)ins=r;});
    wrap.insertBefore(row,ins);
    var inp=document.getElementById(id);inp.oninput=recalc;
    var prev=wrap.querySelector('input');if(prev&&prev.value&&!inp.value)inp.value=prev.value;
    inp.focus();
  } else { var row=document.getElementById('r'+id);if(row)row.parentNode.removeChild(row); }
  recalc();
}
function collectMonths(){
  var out=[];
  document.querySelectorAll('.mblock').forEach(function(div){
    var i=div.id.slice(2);var label=document.getElementById('mm'+i).value;var entries=[];
    var same=document.getElementById('sm'+i).checked;
    if(same){
      var hrs=Number(document.getElementById('sh'+i).value);
      document.querySelectorAll('#md'+i+' .day.on').forEach(function(b){entries.push({day:Number(b.textContent),hours:hrs});});
    } else {
      div.querySelectorAll('#mh'+i+' .hourrow input').forEach(function(inp){entries.push({day:Number(inp.id.split('_')[1]),hours:Number(inp.value)});});
    }
    out.push({label:label,entries:entries,_same:same});
  });
  return out;
}
function recalc(){
  var el=document.getElementById('total');if(!el)return;
  var rate=Number((document.getElementById('f_rate')||{}).value)||0;var th=0;
  collectMonths().forEach(function(m){m.entries.forEach(function(e){if(e.hours>0)th+=e.hours});});
  el.innerHTML=th?('<b>Total: '+th+' hours'+(rate?(' × £'+rate+'/hr = £'+money(th*rate)):'')+'</b>'):'';
}
function showErrors(msgs){
  var b=document.getElementById('errbox');
  b.innerHTML='<b>Please fix:</b><br>'+msgs.map(function(m){return '• '+esc(m)}).join('<br>');
  b.style.display='block';window.scrollTo({top:0,behavior:'smooth'});
}
function submit(){
  var $=function(id){return document.getElementById(id)};
  var e=[];
  if(!$('f_name').value.trim())e.push('Full name');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test($('f_email').value.trim()))e.push('A valid email address');
  if(!$('f_phone').value.trim())e.push('Phone number');
  var role=$('f_role').value;if(!role)e.push('Role');
  if(role==='Pharmacist'&&!/^\d{7}$/.test($('f_gphc').value.trim()))e.push('GPhC number (7 digits) — required for pharmacists');
  if(!$('f_rtw').checked)e.push('Right-to-work confirmation');
  if(!$('f_pharmacy').value)e.push('Pharmacy');
  if(!$('f_validator').value)e.push('Validator');
  var rate=Number($('f_rate').value);if(!(rate>0))e.push('Rate (£/hr)');
  var months=collectMonths();var anyDays=false;
  months.forEach(function(m){
    if(!m.entries.length)e.push('No days ticked for '+m.label);
    if(m._same){
      if(m.entries.length)anyDays=true;
      var hh=m.entries.length?m.entries[0].hours:0;
      if(m.entries.length&&!(hh>0&&hh<=24))e.push('Hours per day ('+m.label+')');
    } else {
      m.entries.forEach(function(en){anyDays=true;if(!(en.hours>0&&en.hours<=24))e.push('Hours for the '+ordinal(en.day)+' ('+m.label+')')});
    }
  });
  if(!anyDays&&months.length)e.push('Tick at least one day');
  var sort=$('f_sort').value.replace(/[\s-]/g,'');
  if(!/^\d{6}$/.test(sort))e.push('Sort code (exactly 6 digits)');
  if(!/^\d{8}$/.test($('f_acct').value.trim()))e.push('Account number (exactly 8 digits)');
  if($('f_acct').value.trim()!==$('f_acct2').value.trim())e.push('Account number and confirmation must match');
  if(!$('f_bankname').value.trim())e.push('Account holder name');
  if(e.length){showErrors(e);return;}
  document.getElementById('errbox').style.display='none';
  var btn=$('submitbtn');btn.disabled=true;btn.textContent='Submitting…';
  var payload={name:$('f_name').value.trim(),email:$('f_email').value.trim(),phone:$('f_phone').value.trim(),
    role:role,roleOther:$('f_roleother').value.trim(),gphc:$('f_gphc').value.trim(),
    pharmacy:$('f_pharmacy').value,validatorName:$('f_validator').value,rate:rate,months:months,
    bankName:$('f_bankname').value.trim(),sort:sort,acct:$('f_acct').value.trim(),acct2:$('f_acct2').value.trim(),
    notes:$('f_notes').value.trim()};
  apiPost({action:'submit',payload:payload}).then(function(res){
    if(!res.ok){showErrors(res.errors||[res.message||'Something went wrong — try again.']);btn.disabled=false;btn.textContent='Submit claim';return;}
    h('<div class="card center"><h2>Claim submitted</h2>'+
      '<p>Your reference is</p><p class="bigref">'+esc(res.ref)+'</p>'+
      '<p>Total claimed: <b>£'+esc(res.total)+'</b> ('+esc(String(res.hours))+' hours)</p>'+
      '<div class="banner info">'+esc(res.validator)+' has been asked to validate it. A confirmation email is on its way to <b>'+esc(payload.email)+'</b> — check spam the first time.</div>'+
      '<button class="btn" onclick="location.reload()">Submit another claim</button></div>');
    window.scrollTo(0,0);
  }).catch(function(){
    showErrors(['No connection — your claim was NOT submitted. Check your signal and press Submit again.']);
    btn.disabled=false;btn.textContent='Submit claim';
  });
}

function claimPage(token){
  apiGet({action:'claim',token:token}).then(function(c){
    if(!c.ok){
      if(c.code==='processed') return h('<div class="card"><div class="banner info">Claim <b>'+esc(c.ref)+'</b> was already <b>'+esc(c.status)+'</b>'+(c.decidedAt?' on '+new Date(c.decidedAt).toLocaleString('en-GB'):'')+'.</div><p class="hint">No further action is needed. Nothing has been sent twice.</p></div>');
      if(c.code==='expired') return h('<div class="card"><div class="banner bad">This link has expired.</div><p class="hint">Ask the locum to resubmit, or contact head office.</p></div>');
      return h('<div class="card"><div class="banner bad">This link is not valid.</div><p class="hint">The claim may have been removed. Contact head office if unexpected.</p></div>');
    }
    if(c.view==='accounts') renderAccounts(token,c); else renderReview(token,c);
  }).catch(function(){ fatal('No connection — check your signal and try again.'); });
}

// shared between the validator view and the accounts view
function claimSummary(c){

  }).join('');

  }).join('');
  return '<table class="kv">'+

    '<tr><td>Role</td><td>'+esc(c.role)+(c.roleOther?' — '+esc(c.roleOther):'')+(c.gphc?'<br>GPhC '+esc(c.gphc):'')+'</td></tr>'+
    '<tr><td>Pharmacy</td><td>'+esc(c.pharmacy)+' ('+esc(c.company)+')</td></tr>'+
    '<tr><td>Rate</td><td>£'+money(c.rate)+'/hr</td></tr>'+
    '<tr><td>Total</td><td><b>£'+money(c.split.totalAmount)+'</b> · '+c.split.totalHours+' hours</td></tr>'+

function flagsBlock(c){
  var flags=(c.flags||[]).map(function(f){return '<p class="flag">'+esc(f)+'</p>'}).join('');
  return flags?'<h3>Check these before you go on</h3><div class="flagbox">'+flags+'</div>':'';
}

function renderReview(token,c,errMsg){
  h('<div class="card">'+
    (errMsg?'<div class="banner bad">'+esc(errMsg)+'</div>':'')+
    '<h2>Locum claim '+esc(c.ref)+'</h2>'+
    '<p class="sub">Please check every detail. Approving sends this claim to accounts for payment.</p>'+
    claimSummary(c)+
    flagsBlock(c)+
    '<p class="hint" style="margin-top:14px">Bank details are not shown here — accounts receive them after your approval. Nothing is paid until you approve.</p>'+
    '<button class="btn green" id="approvebtn">Approve — send to accounts</button>'+
    '<details><summary>Reject this claim…</summary>'+
    '<label>Reason (required — the locum sees this and resubmits)</label>'+
    '<textarea id="rejreason" rows="3"></textarea>'+
    '<button class="btn red" id="rejectbtn">Reject with this reason</button>'+
    '</details>'+
    '</div>');

  document.getElementById('approvebtn').onclick=function(){ decide(token,'approve','',c); };

function decide(token,action,reason,c){
  var ab=document.getElementById('approvebtn'),rb=document.getElementById('rejectbtn');
  if(ab)ab.disabled=true; if(rb)rb.disabled=true;
  (action==='approve'?ab:rb).textContent='Working…';
  apiPost({action:action,token:token,reason:reason}).then(function(res){
    if(!res.ok){
      if(res.code==='processed') return h('<div class="card"><div class="banner info">Claim <b>'+esc(res.ref)+'</b> was already <b>'+esc(res.status)+'</b>. Nothing has been sent twice.</div></div>');
      return renderReview(token,c,res.message||'Something went wrong — try again.');
    }
    if(res.status==='APPROVED'){
      h('<div class="card center"><h2>Approved</h2>'+
        '<div class="banner good"><b>'+esc(res.ref)+'</b> approved. Accounts have been sent the full claim for payment, and '+esc(res.locum)+' has been told it is approved.</div>'+
        '<p class="hint">You will receive a receipt email for your records. You can close this page.</p></div>');
    } else {
      h('<div class="card center"><h2>Claim rejected</h2>'+
        '<div class="banner info"><b>'+esc(res.ref)+'</b> rejected. '+esc(res.locum)+' has been emailed the reason and can resubmit a corrected claim.</div>'+
        '<p class="hint">You will receive a receipt email for your records. You can close this page.</p></div>');
    }
    window.scrollTo(0,0);
  }).catch(function(){ renderReview(token,c,'No connection — nothing was changed. Check your signal and try again.'); });
}

// ===========================================================================
// ACCOUNTS — PAY, OR SEND IT BACK
// The gap this closes: before, only the validator had a lever. Accounts could
// not say "paid" (so locums chased) and could not push back on a claim that
// was approved but wrong. Now they can do both, and their name is on it.
// ===========================================================================
function renderAccounts(token,c,errMsg){
  var a=c.approval||{};
  var when=a.at?new Date(a.at).toLocaleString('en-GB'):'';
  h('<div class="card">'+
    (errMsg?'<div class="banner bad">'+esc(errMsg)+'</div>':'')+
    '<h2>Pay claim '+esc(c.ref)+'</h2>'+
    '<p class="sub">Approved and ready to pay. Tap Paid once the money has gone, and the locum is told automatically.</p>'+
    '<div class="stamp">Approved by <b>'+esc(a.by||'the validator')+'</b>'+(when?' on '+esc(when):'')+'</div>'+
    claimSummary(c)+
    flagsBlock(c)+
    (c.bank&&c.bank.acct
      ? '<h3>Where to send it</h3>'+
        '<div class="bank">'+
        '<table class="kv" style="margin:0">'+
        '<tr><td>Name on account</td><td><b>'+esc(c.bank.name)+'</b></td></tr>'+
        '<tr><td>Sort code</td><td><span class="num">'+esc(c.bank.sort)+'</span></td></tr>'+
        '<tr><td>Account number</td><td><span class="num">'+esc(c.bank.acct)+'</span></td></tr>'+
        '<tr><td>Amount</td><td><b>£'+money(c.split.totalAmount)+'</b></td></tr>'+
        '<tr><td>Reference</td><td><b>'+esc(c.ref)+'</b></td></tr>'+
        '</table>'+
        '</div>'
      // branch-cash claims carry no bank details — they settle via the cash log
      : '<div class="banner info">No bank details on this claim — it is to be settled in cash at the branch (see the flags for the cash entry). Do not send a bank transfer; tick "paid in cash" below once it is right, or send it back.</div>')+
    '<label>Your name</label><input type="text" id="a_by" autocomplete="name">'+
    '<p class="hint">Recorded against the payment, so we know who sent it.</p>'+
    '<div class="check"><input type="checkbox" id="a_cash"><span>Paid in cash at the branch — a cash-log entry covers this, do not send a bank transfer</span></div>'+
    '<button class="btn green" id="paidbtn">Paid — money sent</button>'+
    '<details><summary>Send it back instead…</summary>'+
    '<label>Send it back to</label>'+
    '<select id="raiseto">'+
      '<option value="validator">'+esc(a.by||'The validator')+' — approval looks wrong</option>'+
      '<option value="locum">'+esc(c.locum.name)+' — the locum needs to fix something</option>'+
    '</select>'+
    '<label>Reason (required — they see this)</label>'+
    '<textarea id="raisereason" rows="3"></textarea>'+
    '<button class="btn red" id="raisebtn">Send it back</button>'+
    '</details>'+
    '</div>');

  var saved=''; try{ saved=localStorage.getItem('crest_accounts_name')||''; }catch(e){}
  document.getElementById('a_by').value=saved;

  document.getElementById('paidbtn').onclick=function(){
    var by=document.getElementById('a_by').value.trim();
    if(!by) return renderAccounts(token,c,'Put your name in before marking it paid — the payment is recorded against it.');
    var cashTick=document.getElementById('a_cash').checked;
    if(!cashTick && !(c.bank&&c.bank.acct))
      return renderAccounts(token,c,'This claim has no bank details — it can only be settled as paid in cash (tick the box), or sent back.');
    try{ localStorage.setItem('crest_accounts_name', by); }catch(e){}
    var extra={by:by};
    if(cashTick) extra.method='cash';
    settle(token,'paid',extra,c);
  };
  document.getElementById('raisebtn').onclick=function(){
    var by=document.getElementById('a_by').value.trim();
    var reason=document.getElementById('raisereason').value.trim();
    var to=document.getElementById('raiseto').value;
    if(!by) return renderAccounts(token,c,'Put your name in before sending it back.');
    if(!reason) return renderAccounts(token,c,'A reason is required — they need to know what to fix.');
    try{ localStorage.setItem('crest_accounts_name', by); }catch(e){}
    settle(token,'raise',{by:by,to:to,reason:reason},c);
  };
}

function settle(token,action,extra,c){
  var pb=document.getElementById('paidbtn'), rb=document.getElementById('raisebtn');
  if(pb)pb.disabled=true; if(rb)rb.disabled=true;
  (action==='paid'?pb:rb).textContent='Working…';
  var body={action:action, token:token};
  for(var k in extra) body[k]=extra[k];
  apiPost(body).then(function(res){
    if(!res.ok){
      if(res.code==='processed') return h('<div class="card"><div class="banner info">Claim <b>'+esc(res.ref)+'</b> was already <b>'+esc(res.status)+'</b>. Nothing has been sent twice.</div></div>');
      return renderAccounts(token,c,res.message||'Something went wrong — try again.');
    }
    if(res.status==='PAID'){
      h('<div class="card center"><h2>Paid</h2>'+
        '<div class="banner good"><b>'+esc(res.ref)+'</b> marked paid by '+esc(extra.by)+'. '+
        (extra.method==='cash'
          ? esc(res.locum)+' has been emailed that the claim is settled in cash — no bank transfer.'
          : esc(res.locum)+' has been emailed to say the money is on its way.')+'</div>'+
        '<p class="hint">You can close this page.</p></div>');
    } else {
      var who = extra.to==='locum' ? res.locum : (c.approval&&c.approval.by)||'the validator';
      h('<div class="card center"><h2>Sent back</h2>'+
        '<div class="banner info"><b>'+esc(res.ref)+'</b> sent back to '+esc(who)+' with your reason. Nothing has been paid.</div>'+
        '<p class="hint">You will get an email when it comes back to you. You can close this page.</p></div>');
    }
    window.scrollTo(0,0);
  }).catch(function(){ renderAccounts(token,c,'No connection — nothing was changed. Check your signal and try again.'); });
}

// DEMO BACKEND (only runs when API_URL is not configured)
// Clicks through the whole flow with no server. Reads the SAME shared config
// the admin page writes (localStorage 'crest_config'), so editing validators
// or emails in admin.html shows up here — that is the real architecture in
// miniature: admin writes, every tool reads.
//
// The flag rules and the self-approval block below are mirrored exactly in
// BACKEND_SPEC.md. If you change one, change both.
// ===========================================================================
var DEMO_CONFIG_FALLBACK = {
  pharmacies:[
    {name:'Crest — High Street', active:true},
    {name:'Crest — Riverside', active:true},
    {name:'Crest — Market Square', active:true},
    {name:'Crest — Station Road', active:true}
  ],
  validators:[
    {pharmacy:'Crest — High Street', name:'Sam Okafor', email:'moukik.cyber+val.sam@gmail.com', active:true},
    {pharmacy:'Crest — Riverside', name:'Priya Shah', email:'moukik.cyber+val.priya@gmail.com', active:true},
    {pharmacy:'Crest — Market Square', name:'Tom Ellis', email:'moukik.cyber+val.tom@gmail.com', active:true},
    {pharmacy:'Crest — Station Road', name:'Aisha Khan', email:'moukik.cyber+val.aisha@gmail.com', active:true}
  ]
};
function demoConfig(){
  try{ var s=localStorage.getItem('crest_config'); if(s) return JSON.parse(s); }catch(e){}
  return DEMO_CONFIG_FALLBACK;
}
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function demo(method, p){
  return new Promise(function(resolve){ setTimeout(function(){ resolve(demoHandle(method,p)); }, 300); });
}
function demoRef(){ return 'CLM-'+Math.random().toString(36).slice(2,7).toUpperCase(); }
function demoTok(){ return 'demo'+Math.random().toString(36).slice(2,9); }
function bankKey(b){ return b.sort+'|'+b.acct; }

function demoHandle(method,p){
  var cfg=demoConfig();

  if(method==='GET' && p.action==='meta'){
    var vmap={};
    (cfg.validators||[]).filter(function(v){return v.active;}).forEach(function(v){
      (vmap[v.pharmacy]=vmap[v.pharmacy]||[]).push(v.name);
    });
    var now=new Date(), months=[];
    for(var i=0;i<3;i++){
      var d=new Date(now.getFullYear(), now.getMonth()-i, 1);
      months.push({
        label: d.toLocaleString('en-GB',{month:'long'})+' '+d.getFullYear(),
        maxDay: new Date(d.getFullYear(), d.getMonth()+1, 0).getDate()
      });
    }
    return {ok:true,
      pharmacies:(cfg.pharmacies||[]).filter(function(x){return x.active;}).map(function(x){return x.name;}),
      validators:vmap, months:months};
  }

  if(method==='POST' && p.action==='submit'){
    var pl=p.payload;
    // --- self-approval block: a locum cannot be their own validator ---
    var v=(cfg.validators||[]).filter(function(x){
      return x.pharmacy===pl.pharmacy && x.name===pl.validatorName && x.active; })[0];
    if(v && v.email && pl.email && v.email.toLowerCase()===pl.email.toLowerCase()){
      return {ok:false, errors:['The validator you picked uses the same email address as you. Someone else has to approve your claim — pick a different validator, or ask head office.']};
    }
    // --- build the month split ---
    var months=[], rows=[], totalHours=0, totalAmount=0, dayKeys=[];
    (pl.months||[]).forEach(function(m){
      var hours={}, days=[], mh=0;
      m.entries.forEach(function(en){
        if(!(en.hours>0)) return;
        days.push(en.day); hours[String(en.day)]=en.hours; mh+=en.hours;
        dayKeys.push(m.label+'|'+en.day);
      });
      if(!days.length) return;
      days.sort(function(a,b){return a-b;});
      months.push({label:m.label, days:days, hours:hours});
      rows.push({label:m.label, daysCount:days.length, hours:mh, amount:mh*pl.rate});
      totalHours+=mh; totalAmount+=mh*pl.rate;
    });
    // --- flags: mirrored in BACKEND_SPEC.md ---
    var flags=[], hist=lsGet('lc_history')||[];
    var mine=hist.filter(function(x){ return x.email===(pl.email||'').toLowerCase() && x.status!=='REJECTED'; });
    var dup={};
    mine.forEach(function(x){
      var overlap=(x.days||[]).filter(function(d){ return dayKeys.indexOf(d)>=0; });
      if(overlap.length) dup[x.ref]=(dup[x.ref]||[]).concat(overlap);
    });
    Object.keys(dup).forEach(function(ref){
      var pretty=dup[ref].map(function(k){ var s=k.split('|'); return s[1]+' '+s[0].split(' ')[0]; }).join(', ');
      flags.push('Same days as claim '+ref+', already sent in: '+pretty+'. Check this is not a repeat.');
    });
    var nk=bankKey({sort:pl.sort, acct:pl.acct});
    var last=mine.length?mine[mine.length-1]:null;
    if(last && last.bankKey && last.bankKey!==nk){
      flags.push('The bank details are different from this locum’s last claim ('+last.ref+'). Ring them on a number you already have to check, before any money is sent — do not just reply to the email.');
    }

    var ref=demoRef(), token=demoTok();
    var claim={ref:ref, status:'SUBMITTED', view:'validator',
      locum:{name:pl.name, email:pl.email, phone:pl.phone},
      role:pl.role, roleOther:pl.roleOther, gphc:pl.gphc,
      pharmacy:pl.pharmacy, company:'Crest Pharmacies', validatorName:pl.validatorName,
      validatorEmail:(v&&v.email)||'', rate:pl.rate, months:months,
      split:{rows:rows, totalHours:totalHours, totalAmount:totalAmount},
      bank:{name:pl.bankName, sort:pl.sort, acct:pl.acct},
      notes:pl.notes, flags:flags, submittedAt:new Date().toISOString()};
    lsSet('lc_claim_'+ref, claim);
    lsSet('lc_tok_'+token, {ref:ref, view:'validator'});
    hist.push({ref:ref, email:(pl.email||'').toLowerCase(), bankKey:nk, days:dayKeys, status:'SUBMITTED'});
    lsSet('lc_history', hist);
    console.log('%c[DEMO] Validator link ('+pl.validatorName+'):', 'color:#0D47A1;font-weight:bold',
      location.pathname+'?token='+token);
    if(flags.length) console.log('%c[DEMO] flags raised:', 'color:#B45309;font-weight:bold', flags);
    return {ok:true, ref:ref, total:money(totalAmount), hours:totalHours, validator:pl.validatorName};
  }

  var t = p.token ? lsGet('lc_tok_'+p.token) : null;
  var c = t ? lsGet('lc_claim_'+t.ref) : null;

  if(method==='GET' && p.action==='claim'){
    if(!c) return {ok:false, code:'invalid'};
    if(t.view==='validator' && c.status!=='SUBMITTED' && c.status!=='RAISED')
      return {ok:false, code:'processed', ref:c.ref, status:c.status, decidedAt:c.decidedAt};
    if(t.view==='accounts' && c.status!=='APPROVED')
      return {ok:false, code:'processed', ref:c.ref, status:c.status, decidedAt:c.decidedAt};
    var out={}; for(var k in c) out[k]=c[k];
    out.ok=true; out.view=t.view;
    if(t.view!=='accounts') delete out.bank;  // validator never sees bank details
    return out;
  }

  if(method==='POST' && (p.action==='approve'||p.action==='reject')){
    if(!c) return {ok:false, code:'invalid'};
    if(c.status!=='SUBMITTED' && c.status!=='RAISED')
      return {ok:false, code:'processed', ref:c.ref, status:c.status};
    c.decidedAt=new Date().toISOString();
    if(p.action==='reject'){
      c.status='REJECTED'; c.rejectReason=p.reason;
      lsSet('lc_claim_'+c.ref, c); demoHistStatus(c.ref,'REJECTED');
      return {ok:true, ref:c.ref, status:'REJECTED', locum:c.locum.name};
    }
    c.status='APPROVED';
    c.approval={by:c.validatorName, email:c.validatorEmail, at:c.decidedAt};
    var atok=demoTok();
    lsSet('lc_claim_'+c.ref, c);
    lsSet('lc_tok_'+atok, {ref:c.ref, view:'accounts'});
    demoHistStatus(c.ref,'APPROVED');
    console.log('%c[DEMO] Accounts link:', 'color:#1E9E5A;font-weight:bold', location.pathname+'?token='+atok);
    return {ok:true, ref:c.ref, status:'APPROVED', locum:c.locum.name};
  }

  if(method==='POST' && (p.action==='paid'||p.action==='raise')){
    if(!c) return {ok:false, code:'invalid'};
    if(c.status!=='APPROVED') return {ok:false, code:'processed', ref:c.ref, status:c.status};
    if(p.action==='paid'){
      c.status='PAID'; c.payment={by:p.by, at:new Date().toISOString(), method:p.method==='cash'?'cash':'bank'};
      lsSet('lc_claim_'+c.ref, c); demoHistStatus(c.ref,'PAID');
      return {ok:true, ref:c.ref, status:'PAID', locum:c.locum.name};
    }
    c.status='RAISED'; c.raise={by:p.by, to:p.to, reason:p.reason, at:new Date().toISOString()};
    lsSet('lc_claim_'+c.ref, c); demoHistStatus(c.ref,'RAISED');
    if(p.to==='validator'){
      var vtok=demoTok(); lsSet('lc_tok_'+vtok, {ref:c.ref, view:'validator'});
      console.log('%c[DEMO] Back to validator:', 'color:#D7382B;font-weight:bold', location.pathname+'?token='+vtok);
    } else {
      console.log('%c[DEMO] Locum emailed to fix and resubmit:', 'color:#D7382B;font-weight:bold', c.locum.email, p.reason);
    }
    return {ok:true, ref:c.ref, status:'RAISED', locum:c.locum.name};
  }
  return {ok:false, message:'Unknown action'};
}
function demoHistStatus(ref,status){
  var hist=lsGet('lc_history')||[];
  hist.forEach(function(x){ if(x.ref===ref) x.status=status; });
  lsSet('lc_history', hist);
}
</script>
